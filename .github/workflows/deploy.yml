name: Build and Push Docker Image

on:
  push:
    branches:
      - master
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: concasauxinhdep1704/vominhtam:latest

      - name: Triển khai lên DevOps Classroom
        run: |
          # Tham số khớp với hình ảnh: Slot 6, Port 80
          REPO="concasauxinhdep1704/vominhtam"
          
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X GET "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=6&container_port=80")
          
          BODY=$(echo "$RESPONSE" | head -n -1)
          CODE=$(echo "$RESPONSE" | tail -n 1)
          
          echo "Webhook HTTP Response Code: $CODE"
          
          if [ "$CODE" -eq 200 ] || [ "$CODE" -eq 201 ]; then
            echo "✅ Deploy thành công!"
            echo "::group::Phản hồi từ Server"
            echo "$BODY"
            echo "::endgroup::"
          else
            echo "❌ Deploy thất bại (Lỗi $CODE)!"
            echo "Phản hồi: $BODY"
            exit 1
          fi

      - name: Finish Status
        run: echo "Workflow hoàn tất! Truy cập web tại cổng 21110"
