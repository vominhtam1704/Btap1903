name: Build and Push Docker Image

on:
  push:
    branches:
      - master
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Đã sửa theo đúng Namespace trong ảnh Docker Hub của bạn
          tags: concasauxinhdep1704/vominhtam:latest

      - name: Triển khai lên DevOps Classroom (Webhook)
        run: |
          # Cấu hình tham số
          REPO="concasauxinhdep1704/vominhtam"
          CONTAINER_PORT=80
          
          # Gửi request và lấy cả Body lẫn HTTP Code
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=1&container_port=$CONTAINER_PORT")
          
          # Tách nội dung Body và Code
          BODY=$(echo "$RESPONSE" | head -n -1)
          CODE=$(echo "$RESPONSE" | tail -n 1)
          
          echo "Webhook HTTP Response Code: $CODE"
          
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "❌ Deploy thất bại!"
            echo "::group::Chi tiết lỗi (JSON)"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          else
            echo "✅ Deploy thành công!"
            echo "::group::Phản hồi từ Server"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
          fi

      - name: Finish Status
        run: echo "Workflow hoàn tất!"
