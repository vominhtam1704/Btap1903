name: Build and Push Docker Image

on:
  push:
    branches:
      - master
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: concasauxinhdep1704/vominhtam:latest

      - name: Triển khai lên DevOps Classroom
        run: |
          # 1. Khai báo thông tin (Khớp với Slot 6 và Dockerfile)
          REPO="concasauxinhdep1704/vominhtam"
          SLOT=6
          # SỬA TẠI ĐÂY: Đổi từ 80 thành 8080 để khớp với EXPOSE trong Dockerfile
          PORT=8080
          
          # 2. Gửi request Webhook
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=$SLOT&container_port=$PORT")
          
          BODY=$(echo "$RESPONSE" | head -n -1)
          CODE=$(echo "$RESPONSE" | tail -n 1)
          
          echo "Webhook HTTP Status: $CODE"
          
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "❌ Deploy thất bại. Kiểm tra log chi tiết bên dưới:"
            echo "::group::Chi tiết lỗi từ Server"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          else
            echo "✅ Deploy thành công!"
            echo "::group::Phản hồi thành công"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
          fi
