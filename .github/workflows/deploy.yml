name: Build and Push Docker Image

on:
  push:
    branches:
      - master
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Đảm bảo tag này khớp với "Docker Hub URL/Repo" bạn nhập trên web
          tags: ${{ secrets.DOCKER_USERNAME }}/vominhtam:latest

      - name: Trigger Webhook Deploy
        run: |
          curl -X GET "${{ secrets.DEPLOY_URL }}"
        # Bước này sẽ gọi đến link webhook bạn đã lưu trong secret để server bắt đầu deploy.

      - name: Status Update
        run: echo "Docker image pushed and deploy triggered successfully!"
